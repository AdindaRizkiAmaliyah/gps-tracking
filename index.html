<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPS Tracker</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
padding:30px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
max-width:420px;
margin:auto;
}

h2{
margin-bottom:10px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

.status{
margin-top:15px;
color:#666;
font-size:14px;
}

.dataBox{
margin-top:20px;
background:#f7f9ff;
padding:15px;
border-radius:10px;
text-align:left;
}

.dataRow{
margin:8px 0;
font-size:14px;
}

.label{
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>GPS Tracker</h2>

<input id="device" placeholder="Device ID (contoh: iphone-adinda)">

<button onclick="startTracking()">Start Tracking</button>

<div class="status" id="status">
Status: Belum tracking
</div>

<div class="dataBox">

<div class="dataRow">
<span class="label">Latitude :</span>
<span id="lat">-</span>
</div>

<div class="dataRow">
<span class="label">Longitude :</span>
<span id="lng">-</span>
</div>

<div class="dataRow">
<span class="label">Accuracy :</span>
<span id="acc">-</span>
</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw5I0crqb3J_tcJp74-A2IIHHT5suyPlNQDr74nKC6FcEZJDTYoPu-ep54p9ksthzsE/exec";

function startTracking(){

const device = document.getElementById("device").value;

if(device === ""){
alert("Masukkan device_id dulu!");
return;
}

document.getElementById("status").innerText = "Tracking aktif...";

navigator.geolocation.watchPosition(

function(position){

const lat = position.coords.latitude;
const lng = position.coords.longitude;
const acc = position.coords.accuracy;

document.getElementById("lat").innerText = lat;
document.getElementById("lng").innerText = lng;
document.getElementById("acc").innerText = acc + " meter";

fetch(API_URL + "?lat=" + lat + "&lng=" + lng + "&device=" + device);

},

function(error){

document.getElementById("status").innerText = "GPS Error";

},

{
enableHighAccuracy:true
}

);

}

</script>

</body>
</html>
