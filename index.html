<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Live GPS Tracker</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

#map{
height:450px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>📍 Live GPS Tracker</h2>

<div class="container">

<input id="device"
placeholder="Nama Device (contoh: iPhone Adinda)">

<br>

<button onclick="startTracking()">
Start Tracking
</button>

<div id="status">
Status: belum tracking
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw5I0crqb3J_tcJp74-A2IIHHT5suyPlNQDr74nKC6FcEZJDTYoPu-ep54p9ksthzsE/exec";

let map = L.map('map').setView([-7.274,112.760], 15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let marker;

function startTracking(){

const device =
document.getElementById("device").value;

if(device===""){
alert("Masukkan nama device dulu");
return;
}

document.getElementById("status").innerText
="Tracking aktif...";

navigator.geolocation.watchPosition(

function(position){

const lat = position.coords.latitude;
const lng = position.coords.longitude;

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker = L.marker([lat,lng]).addTo(map);
}

map.setView([lat,lng],16);

fetch(API_URL +
"?lat="+lat+
"&lng="+lng+
"&device="+device);

},

function(error){

document.getElementById("status").innerText
="GPS Error";

},

{
enableHighAccuracy:true
}

);

}

</script>

</body>
</html>
