<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPS Tracker</title>

<style>
body{
font-family: Arial;
text-align:center;
padding:30px;
background:#f4f6fb;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

.status{
margin-top:20px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h2>GPS Tracker</h2>

<input id="device" placeholder="Nama Device (contoh: iPhone Adinda)">

<br>

<button onclick="startTracking()">Start Tracking</button>

<div class="status" id="status">
Status: Belum tracking
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw5I0crqb3J_tcJp74-A2IIHHT5suyPlNQDr74nKC6FcEZJDTYoPu-ep54p9ksthzsE/exec";

function startTracking(){

const device = document.getElementById("device").value;

if(device === ""){
alert("Masukkan nama device dulu!");
return;
}

document.getElementById("status").innerText = "Tracking aktif...";

navigator.geolocation.watchPosition(

function(position){

const lat = position.coords.latitude;
const lng = position.coords.longitude;

fetch(API_URL + "?lat=" + lat + "&lng=" + lng + "&device=" + device);

},

function(error){

document.getElementById("status").innerText = "GPS Error";

},

{
enableHighAccuracy:true
}

);

}

</script>

</body>
</html>
